<!doctype html>
<html lang="en">
<head>

  <title>Heritages And Culture</title>
  <style>
    /* page2.css - styles for the gallery page */
:root{
  --bg: #f9ddb2;
  --card-bg: #ffffff;
  --muted: #666;
  --accent: #0b74de;
  --gap: 20px;
  --radius: 12px;
}

*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Inter, Roboto, Arial, sans-serif;background:var(--bg);color:#222}
.gallery-page{
  min-height:100vh;
  padding:40px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Title */
.title{
  margin:0 0 20px 0;
  font-size:28px;
  letter-spacing:0.2px;
}

/* Grid layout for 4 items */
.grid{
  width:100%;
  max-width:1100px;
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:var(--gap);
  align-items:start;
}

/* Card */
.card{
  background:var(--card-bg);
  border-radius:var(--radius);
  padding:10px;
  box-shadow: 0 6px 18px rgba(22,28,37,0.06);
  display:flex;
  flex-direction:column;
  align-items:stretch;
  transition:transform .18s ease, box-shadow .18s ease;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow: 0 12px 30px rgba(22,28,37,0.12);
}

/* Image responsivity and cropping */
.card-img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:8px;
  display:block;
}

/* Links container */
.card-links{
  margin-top:12px;
  display:flex;
  gap:10px;
  justify-content:flex-start;
  align-items:center;
  padding:0 4px 8px 4px;
}

/* Link styles */
.card-links a{
  text-decoration:none;
  font-size:14px;
  padding:8px 10px;
  border-radius:8px;
  transition:background .12s ease, transform .12s ease;
  display:inline-block;
}

/* Wikipedia link */
.card-links .wiki{
  color:var(--card-bg);
  background:var(--accent);
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.06);
}

.card-links .wiki:hover{ transform:translateY(-2px); }

/* Audio link style */
.card-links .audio{
  color:var(--accent);
  background:transparent;
  border:1px solid rgba(11,116,222,0.2);
}

.card-links .audio:hover{
  background:rgba(11,116,222,0.06);
  transform:translateY(-2px);
}

/* Footer/back link */
.footer{ margin-top:28px; }
.back{
  color:var(--muted);
  text-decoration:none;
  font-size:14px;
}
.back:hover{ text-decoration:underline; }

/* Responsive adjustments */
@media (max-width:1000px){
  .grid{ grid-template-columns: repeat(2, 1fr); }
  .card-img{ height:180px; }
}
@media (max-width:520px){
  .grid{ grid-template-columns: 1fr; gap:12px; }
  .card-img{ height:220px; }
  .gallery-page{ padding:20px 12px; }
}
  </style>
</head>
<body>
